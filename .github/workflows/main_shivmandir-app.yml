name: Build and Deploy ShivMandir App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Debug build output
        run: |
          echo "=== .next/standalone (dotfiles visible) ==="
          ls -la .next/standalone
          echo "=== .next/standalone/.next ==="
          ls -la .next/standalone/.next

      - name: Package standalone output
        run: |
          rm -rf release
          mkdir -p release

          # /. suffix copies all contents including the hidden .next/ subdir
          # (shell glob * would silently skip it).
          cp -R .next/standalone/. release/

          # standalone omits .next/static — server.js expects it at
          # process.cwd()/.next/static.
          cp -R .next/static release/.next/static

          cp -R public release/public

          echo "=== release root ==="
          ls -la release
          echo "=== release/.next ==="
          ls -la release/.next
          echo "=== release tree (first 80 files) ==="
          find release -maxdepth 3 -type f | head -80

          test -f release/server.js
          test -d release/.next/server
          test -d release/.next/static
          test -d release/public

      - name: Create deployment ZIP
        run: |
          # zip -r from inside the directory keeps server.js at archive root
          # and preserves symlinks in node_modules/.bin correctly.
          # The action's built-in folder archiver does NOT handle symlinks,
          # which causes Kudu's "Fetching changes" step to fail on Azure.
          cd release
          zip -r ../release.zip .
          cd ..

          echo "ZIP size: $(du -sh release.zip | cut -f1)"
          echo "=== ZIP top-level entries ==="
          unzip -l release.zip | head -60
          echo "=== Verify critical entries ==="
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"
          unzip -l release.zip | grep ".next/server"

      - name: Upload deployment ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment ZIP
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify downloaded ZIP
        run: |
          ls -la
          echo "ZIP size: $(du -sh release.zip | cut -f1)"
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2E12F77A25A7445DA632F3CE8BDAEFC7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_079BCE68D4D845F380BC5A5A5152FBA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09BA46F7116440B38361541CCE9EB041 }}

      - name: Configure Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'shivmandir-app'
          # No slot-name: omitting targets the production slot correctly.
          # 'Production' (capital-P) is misread as a staging slot name.
          app-settings-json: >-
            [
              {"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false",                              "slotSetting": false},
              {"name": "ENABLE_ORYX_BUILD",              "value": "false",                              "slotSetting": false},
              {"name": "WEBSITE_NODE_DEFAULT_VERSION",   "value": "~22",                                "slotSetting": false},
              {"name": "NODE_ENV",                       "value": "production",                         "slotSetting": false},
              {"name": "PORT",                           "value": "8080",                               "slotSetting": false},
              {"name": "HOSTNAME",                       "value": "0.0.0.0",                            "slotSetting": false},
              {"name": "TEMPLE_DONATION_DB_FILE",        "value": "/home/temple-donations.json",        "slotSetting": false}
            ]

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shivmandir-app'
          slot-name: 'Production'
          package: release.zip
          startup-command: 'node server.js'
