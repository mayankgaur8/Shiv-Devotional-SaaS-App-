name: Build and Deploy ShivMandir App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Debug build output
        run: |
          echo "=== .next/standalone ==="
          ls -la .next/standalone
          echo "=== .next/standalone/.next ==="
          ls -la .next/standalone/.next

      - name: Package standalone output
        run: |
          rm -rf release release.zip
          mkdir -p release

          cp -R .next/standalone/. release/
          cp -R .next/static release/.next/static
          cp -R public release/public

          echo "=== release root ==="
          ls -la release
          echo "=== release/.next ==="
          ls -la release/.next
          echo "=== release tree (first 80 files) ==="
          find release -maxdepth 3 -type f | head -80

          test -f release/server.js
          test -d release/.next/server
          test -d release/.next/static
          test -d release/public

      - name: Create deployment ZIP
        run: |
          cd release
          zip -r ../release.zip .
          cd ..

          echo "ZIP size: $(du -sh release.zip | cut -f1)"
          echo "=== ZIP top-level ==="
          unzip -l release.zip | head -40
          echo "=== Critical entries ==="
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"
          unzip -l release.zip | grep ".next/server"

      - name: Upload deployment ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment ZIP
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify downloaded ZIP
        run: |
          ls -la release.zip
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2E12F77A25A7445DA632F3CE8BDAEFC7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_079BCE68D4D845F380BC5A5A5152FBA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09BA46F7116440B38361541CCE9EB041 }}

      - name: Resolve resource group
        id: rg
        run: |
          RG=$(az webapp list \
            --query "[?name=='shivmandir-app'].resourceGroup" \
            --output tsv)
          if [ -z "$RG" ]; then
            echo "::error::Could not resolve resource group for 'shivmandir-app'. Verify service principal permissions."
            exit 1
          fi
          echo "name=$RG" >> "$GITHUB_OUTPUT"
          echo "Resource group: $RG"

      - name: Configure Azure App Settings
        run: |
          az webapp config appsettings set \
            --name shivmandir-app \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_NODE_DEFAULT_VERSION="~22" \
              NODE_ENV=production \
              PORT=8080 \
              HOSTNAME=0.0.0.0 \
              "TEMPLE_DONATION_DB_FILE=/home/temple-donations.json"

      - name: Set startup command
        run: |
          az webapp config set \
            --name shivmandir-app \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --startup-file "node server.js"

      - name: Deploy ZIP to Azure App Service
        run: |
          az webapp deploy \
            --name shivmandir-app \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --src-path release.zip \
            --type zip
