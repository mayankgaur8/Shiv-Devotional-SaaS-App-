name: Build and Deploy ShivMandir App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Test
        run: npm test
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Package standalone output
        run: |
          rm -rf release
          mkdir -p release
          cp -R .next/standalone/. release/
          mkdir -p release/.next
          cp -R .next/static release/.next/static
          cp -R public release/public
          cp package.json release/package.json
          test -f release/server.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivmandir-standalone
          path: release
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: shivmandir-standalone
          path: release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2E12F77A25A7445DA632F3CE8BDAEFC7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_079BCE68D4D845F380BC5A5A5152FBA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09BA46F7116440B38361541CCE9EB041 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shivmandir-app'
          slot-name: 'Production'
          package: release
