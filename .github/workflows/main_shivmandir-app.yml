name: Build and Deploy ShivMandir App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Debug build output
        run: |
          echo "=== .next/standalone ==="
          ls -la .next/standalone
          echo "=== .next/standalone/.next ==="
          ls -la .next/standalone/.next

      - name: Package standalone output
        run: |
          rm -rf release release.zip
          mkdir -p release

          cp -R .next/standalone/. release/
          cp -R .next/static release/.next/static
          cp -R public release/public

          echo "=== release root ==="
          ls -la release
          echo "=== release/.next ==="
          ls -la release/.next
          echo "=== release tree (first 80 files) ==="
          find release -maxdepth 3 -type f | head -80

          test -f release/server.js
          test -d release/.next/server
          test -d release/.next/static
          test -d release/public

      - name: Create deployment ZIP
        run: |
          cd release
          zip -r ../release.zip .
          cd ..

          echo "ZIP size: $(du -sh release.zip | cut -f1)"
          echo "=== ZIP top-level ==="
          unzip -l release.zip | head -40
          echo "=== Critical entries ==="
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"
          unzip -l release.zip | grep ".next/server"

      - name: Upload deployment ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download deployment ZIP
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify downloaded ZIP
        run: |
          ls -la
          test -f release.zip
          unzip -l release.zip | head -50
          unzip -l release.zip | grep "server.js"
          unzip -l release.zip | grep ".next/static"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shivmandir-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
          startup-command: 'node server.js'
