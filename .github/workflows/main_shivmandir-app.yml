name: Build and Deploy ShivMandir App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          NEXT_PUBLIC_RAZORPAY_KEY: dummy
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy

      - name: Debug build output
        run: |
          echo "=== .next/standalone ==="
          ls -la .next/standalone
          echo "=== .next/standalone/.next ==="
          ls -la .next/standalone/.next
          echo "=== Static app chunks (all routes) ==="
          find .next/static/chunks/app -type f | sort
          echo "=== Temple page chunk ==="
          find .next/static/chunks/app -path "*temple*" -type f \
            || { echo "::error::No temple page chunk found in build output"; exit 1; }

      - name: Package standalone output
        run: |
          rm -rf release release.zip
          mkdir -p release

          # Copy standalone server (includes minimal node_modules, NO full project node_modules)
          cp -R .next/standalone/. release/

          # Add client-side static chunks (not included in standalone by design)
          mkdir -p release/.next
          cp -R .next/static release/.next/static

          if [ -d public ]; then
            cp -R public release/public
          fi

          # Tell Kudu to skip NodeProjectOptimizer / Oryx build pipeline.
          # This is belt-and-suspenders alongside WEBSITE_RUN_FROM_PACKAGE=1 in Azure Portal.
          printf '[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT = false\n' > release/.deployment

          echo "=== release root ==="
          ls -la release
          echo "=== release/.next ==="
          ls -la release/.next
          echo "=== Standalone node_modules size ==="
          du -sh release/node_modules
          echo "=== Standalone node_modules top-level packages ==="
          ls release/node_modules | head -20
          echo "=== release/.next/static/chunks/app ==="
          find release/.next/static/chunks/app -type f | sort

          test -f release/server.js          || { echo "::error::server.js missing"; exit 1; }
          test -d release/.next/server       || { echo "::error::.next/server missing"; exit 1; }
          test -d release/.next/static       || { echo "::error::.next/static missing"; exit 1; }
          test -d release/public             || { echo "::error::public missing"; exit 1; }
          test -f release/.deployment        || { echo "::error::.deployment missing"; exit 1; }
          find release/.next/static/chunks/app -path "*temple*" -type f \
            || { echo "::error::temple page chunk missing from release"; exit 1; }

      - name: Create deployment ZIP
        run: |
          cd release
          zip -r ../release.zip .
          cd ..

          echo "=== ZIP size ==="
          ls -lh release.zip
          echo "=== ZIP top-level ==="
          unzip -l release.zip | head -40
          echo "=== Critical entries ==="
          unzip -l release.zip | grep "server\.js"
          unzip -l release.zip | grep "\.deployment"
          unzip -l release.zip | grep "\.next/static" | head -5
          unzip -l release.zip | grep "\.next/server" | head -5
          echo "=== node_modules entry count in ZIP ==="
          unzip -l release.zip | grep -c "node_modules" || true
          echo "=== Temple page chunk in ZIP ==="
          unzip -l release.zip | grep "temple" \
            || { echo "::error::temple chunk missing from release.zip"; exit 1; }

      - name: Upload deployment ZIP
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Validate Azure publish profile secret
        run: |
          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "::error::AZURE_WEBAPP_PUBLISH_PROFILE secret is missing or empty."
            echo ""
            echo "To fix:"
            echo "  1. Azure Portal → App Services → shivmandir-app → Overview → Get publish profile"
            echo "  2. Open the downloaded file and copy the full XML"
            echo "  3. GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "     Name:  AZURE_WEBAPP_PUBLISH_PROFILE"
            echo "     Value: <paste full XML here>"
            exit 1
          fi
          echo "OK: AZURE_WEBAPP_PUBLISH_PROFILE is set (length=${#PUBLISH_PROFILE})"
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Debug downloaded artifact
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Files present ==="
          ls -la
          echo "=== File tree (depth 2) ==="
          find . -maxdepth 2 -type f | head -50

      - name: Validate release ZIP
        run: |
          test -f release.zip || { echo "::error::release.zip not found after artifact download"; exit 1; }
          echo "ZIP size: $(du -sh release.zip | cut -f1)"
          echo "=== ZIP contents (first 50 entries) ==="
          unzip -l release.zip | head -50
          echo "=== Critical entries ==="
          unzip -l release.zip | grep "server.js"   || { echo "::error::server.js missing in ZIP"; exit 1; }
          unzip -l release.zip | grep ".next/static" || { echo "::error::.next/static missing in ZIP"; exit 1; }
          unzip -l release.zip | grep ".next/server" || { echo "::error::.next/server missing in ZIP"; exit 1; }
          echo "OK: release.zip is valid"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shivmandir-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
